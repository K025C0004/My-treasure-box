      <p class="lead">
        60s~70sのロックやブルースを主軸とし、現代音楽と融合させたサウンドを奏でるユニット。
        ボーカルであるレミさんの声はとても特徴的でクール。亀本さんの奏でるギターはカリスマ的。
      </p>

      <img class="artist-img" src="img/glim_spanky.jpg" alt="GLIM SPANKY">

      <h2>好きなところ</h2>
      <ul>
        <li>ギターサウンドが脳を震わせドーパミンが溢れ出す</li>
        <li>レミさんの声がとてもかっこよく幼き頃から魅了され続けている</li>
        <li>歌詞は常に力で溢れていて弱音は吐かない力強さ</li>
      </ul>
